# Log4j2 configuration (do not use log4j 1.x syntax)
status = warn
name = DeliveryLogConfig

# ===== Appender de Arquivo =====
appender.file.type = File
appender.file.name = FileAppender
appender.file.fileName = ${sys:user.dir}/log4j2.log
appender.file.append = false
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} [%t] %-5p %c{1} - %m%n

# ===== Appender de Console =====
appender.console.type = Console
appender.console.name = ConsoleAppender
appender.console.target = SYSTEM_OUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} [%t] %-5p %c{1} - %m%n

# ===== Root Logger =====
rootLogger.level = info
rootLogger.appenderRefs = file, console
rootLogger.appenderRef.file.ref = FileAppender
rootLogger.appenderRef.console.ref = ConsoleAppender

# ===== Hibernate somente no arquivo =====
logger.hibernate.name = org.hibernate
logger.hibernate.level = warn
logger.hibernate.additivity = false
logger.hibernate.appenderRefs = file
logger.hibernate.appenderRef.file.ref = FileAppender

logger.hibernate_sql.name = org.hibernate.SQL
logger.hibernate_sql.level = debug
logger.hibernate_sql.additivity = false
logger.hibernate_sql.appenderRefs = file
logger.hibernate_sql.appenderRef.file.ref = FileAppender

logger.hibernate_bind.name = org.hibernate.orm.jdbc.bind
logger.hibernate_bind.level = trace
logger.hibernate_bind.additivity = false
logger.hibernate_bind.appenderRefs = file
logger.hibernate_bind.appenderRef.file.ref = FileAppender

logger.hibernate_hbm2ddl.name = org.hibernate.tool.hbm2ddl
logger.hibernate_hbm2ddl.level = trace
logger.hibernate_hbm2ddl.additivity = false
logger.hibernate_hbm2ddl.appenderRefs = file
logger.hibernate_hbm2ddl.appenderRef.file.ref = FileAppender